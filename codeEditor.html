<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeFlow - Modern Online Text Editor</title>
    
    <!-- CodeMirror CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/theme/dracula.min.css">
    
    <!-- CodeMirror JS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/codemirror.min.js"></script>
    
    <!-- CodeMirror Modes -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/mode/javascript/javascript.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/mode/htmlmixed/htmlmixed.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/mode/css/css.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/mode/python/python.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/mode/java/java.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/mode/clike/clike.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/mode/php/php.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/mode/ruby/ruby.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/mode/go/go.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/mode/xml/xml.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/mode/markdown/markdown.min.js"></script>
    
    <!-- JS Beautifier -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/js-beautify/1.14.9/beautify.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/js-beautify/1.14.9/beautify-css.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/js-beautify/1.14.9/beautify-html.min.js"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Monaco', monospace;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            overflow: hidden;
        }
        .editor-container {
            height: 100vh;
            display: flex;
            flex-direction: column;
            background: rgba(30, 30, 40, 0.95);
            backdrop-filter: blur(20px);
            margin: 20px;
            border-radius: 30px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.1);
        }
        .toolbar {
            background: rgba(20,20,30,0.8);
            padding: 15px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            flex-wrap: wrap;
            gap: 15px;
        }
        .logo-area { display: flex; align-items: center; gap: 10px; }
        .logo { font-size: 1.8rem; animation: wave 2s ease-in-out infinite; }
        @keyframes wave { 0%,100% { transform: rotate(0deg); } 25% { transform: rotate(15deg); } 75% { transform: rotate(-15deg); } }
        .logo-text { font-size: 1.3rem; font-weight: bold; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .file-controls { display: flex; gap: 12px; flex-wrap: wrap; }
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 8px 18px;
            border-radius: 50px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        button:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(102,126,234,0.4); }
        .btn-outline { background: transparent; border: 2px solid #667eea; color: #667eea; }
        .btn-outline:hover { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }
        .status-area { display: flex; gap: 15px; align-items: center; }
        .language-selector {
            background: rgba(255,255,255,0.1);
            color: white;
            border: 1px solid rgba(255,255,255,0.2);
            padding: 8px 15px;
            border-radius: 50px;
            cursor: pointer;
        }
        .status { color: #4ec9b0; font-size: 12px; padding: 5px 12px; background: rgba(78,201,176,0.1); border-radius: 50px; }
        .main-content { display: flex; flex: 1; overflow: hidden; }
        .sidebar {
            width: 280px;
            background: rgba(20,20,30,0.6);
            border-right: 1px solid rgba(255,255,255,0.1);
            overflow-y: auto;
        }
        .sidebar-header { padding: 20px; color: #fff; font-size: 12px; text-transform: uppercase; letter-spacing: 2px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .file-list { list-style: none; padding: 10px; }
        .file-list li {
            padding: 12px 15px;
            margin-bottom: 5px;
            color: #ccc;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-radius: 12px;
            transition: all 0.3s;
        }
        .file-list li:hover { background: rgba(102,126,234,0.1); transform: translateX(5px); }
        .file-list li.active { background: linear-gradient(135deg, #667eea20 0%, #764ba220 100%); color: white; transform: translateX(5px); }
        .file-name { flex: 1; display: flex; align-items: center; gap: 10px; }
        .delete-file { background: rgba(255,68,68,0.2); color: #ff6666; padding: 4px 10px; border-radius: 8px; }
        .delete-file:hover { background: #ff4444; color: white; }
        .editor-area { flex: 1; display: flex; flex-direction: column; }
        .editor-header {
            padding: 15px 25px;
            background: rgba(20,20,30,0.4);
            border-bottom: 1px solid rgba(255,255,255,0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .current-file-badge { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); padding: 4px 12px; border-radius: 50px; font-size: 11px; }
        .editor-stats { display: flex; gap: 20px; color: #858585; font-size: 12px; }
        .CodeMirror { flex: 1; height: auto !important; background: rgba(20,20,30,0.4) !important; font-size: 15px; line-height: 1.6; }
        .CodeMirror-gutters { background: rgba(20,20,30,0.6) !important; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: rgba(255,255,255,0.05); border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border-radius: 10px; }
        @media (max-width: 768px) { .sidebar { width: 200px; } .toolbar { flex-direction: column; } }
    </style>
</head>
<body>
    <div class="editor-container">
        <div class="toolbar">
            <div class="logo-area">
                <span class="logo">✏️</span>
                <span class="logo-text">CodeFlow Studio</span>
            </div>
            <div class="file-controls">
                <button id="newFileBtn">✨ New File</button>
                <button id="saveBtn" class="btn-outline">💾 Save</button>
                <button id="formatBtn">🎨 Format Code</button>
                <button id="downloadBtn">📥 Download</button>
                <button id="clearBtn">🗑️ Clear</button>
            </div>
            <div class="status-area">
                <select id="languageSelect" class="language-selector">
                    <option value="javascript">🟨 JavaScript</option>
                    <option value="html">🌐 HTML</option>
                    <option value="css">🎨 CSS</option>
                    <option value="python">🐍 Python</option>
                    <option value="java">☕ Java</option>
                    <option value="cpp">⚙️ C++</option>
                    <option value="plaintext">📝 Plain Text</option>
                </select>
                <div class="status" id="status">🚀 Ready to code</div>
            </div>
        </div>

        <div class="main-content">
            <div class="sidebar">
                <div class="sidebar-header">📁 YOUR FILES</div>
                <ul class="file-list" id="fileList"></ul>
            </div>
            <div class="editor-area">
                <div class="editor-header">
                    <div class="current-file">
                        <span>📝 Currently editing</span>
                        <span class="current-file-badge" id="currentFile">untitled.txt</span>
                    </div>
                    <div class="editor-stats">
                        <div class="stat">📊 Lines: <strong id="lineCount">1</strong></div>
                        <div class="stat">📏 Characters: <strong id="charCount">0</strong></div>
                        <div class="stat">💬 Words: <strong id="wordCount">0</strong></div>
                    </div>
                </div>
                <textarea id="editor"></textarea>
            </div>
        </div>
    </div>

    <script>
        let files = { 'untitled.txt': '// Welcome to CodeFlow Studio!\n// Click "Format Code" to beautify your code!\n\nfunction hello(){console.log("Hello World");const x=10;if(x>5){return true;}else{return false;}}' };
        let currentFile = 'untitled.txt';
        let editor = null;

        const fileListEl = document.getElementById('fileList');
        const currentFileEl = document.getElementById('currentFile');
        const statusEl = document.getElementById('status');
        const lineCountEl = document.getElementById('lineCount');
        const charCountEl = document.getElementById('charCount');
        const wordCountEl = document.getElementById('wordCount');
        const languageSelect = document.getElementById('languageSelect');
        const textarea = document.getElementById('editor');

        function initEditor() {
            editor = CodeMirror.fromTextArea(textarea, {
                lineNumbers: true,
                theme: 'dracula',
                mode: 'javascript',
                autoCloseTags: true,
                autoCloseBrackets: true,
                matchBrackets: true,
                indentUnit: 4,
                tabSize: 4,
                lineWrapping: true
            });
            editor.on('change', () => {
                updateStats();
                saveCurrentFile();
            });
            updateStats();
        }

        // FORMAT CODE FUNCTION - WORKS!
        function formatCode() {
            const content = editor.getValue();
            const extension = currentFile.split('.').pop().toLowerCase();
            let formatted = content;
            
            try {
                if (extension === 'js' || extension === 'javascript') {
                    formatted = js_beautify(content, { indent_size: 4, indent_char: ' ' });
                    setStatus('✅ JavaScript code formatted!');
                } 
                else if (extension === 'html' || extension === 'htm') {
                    formatted = html_beautify(content, { indent_size: 4, indent_char: ' ' });
                    setStatus('✅ HTML code formatted!');
                }
                else if (extension === 'css') {
                    formatted = css_beautify(content, { indent_size: 4, indent_char: ' ' });
                    setStatus('✅ CSS code formatted!');
                }
                else if (extension === 'json') {
                    formatted = js_beautify(content, { indent_size: 4 });
                    setStatus('✅ JSON formatted!');
                }
                else {
                    formatted = js_beautify(content, { indent_size: 4 });
                    setStatus('✅ Code formatted!');
                }
                
                if (formatted !== content) {
                    editor.setValue(formatted);
                } else {
                    setStatus('✨ Code is already well formatted!');
                }
            } catch (error) {
                setStatus('❌ Could not format code. Check syntax!');
            }
        }

        function updateStats() {
            if (editor) {
                const content = editor.getValue();
                const lines = content.split('\n').length;
                const chars = content.length;
                const words = content.trim() ? content.trim().split(/\s+/).length : 0;
                lineCountEl.textContent = lines;
                charCountEl.textContent = chars;
                wordCountEl.textContent = words;
            }
        }

        function changeLanguageMode(language) {
            let mode = 'text/plain';
            if (language === 'javascript') mode = 'javascript';
            else if (language === 'html') mode = 'htmlmixed';
            else if (language === 'css') mode = 'css';
            else if (language === 'python') mode = 'python';
            else if (language === 'java') mode = 'text/x-java';
            else if (language === 'cpp') mode = 'text/x-c++src';
            else mode = 'text/plain';
            editor.setOption('mode', mode);
        }

        function updateLanguageFromExtension() {
            const ext = currentFile.split('.').pop().toLowerCase();
            const map = { 'js': 'javascript', 'html': 'html', 'css': 'css', 'py': 'python', 'java': 'java', 'cpp': 'cpp' };
            const lang = map[ext] || 'plaintext';
            languageSelect.value = lang;
            changeLanguageMode(lang);
        }

        function saveFiles() { localStorage.setItem('codeflow_files', JSON.stringify(files)); }
        function saveCurrentFile() { files[currentFile] = editor.getValue(); saveFiles(); renderFileList(); }
        
        function loadCurrentFile() {
            editor.setValue(files[currentFile] || '');
            currentFileEl.textContent = currentFile;
            updateStats();
            updateLanguageFromExtension();
            setStatus(`✨ Loaded ${currentFile}`);
        }

        function loadFiles() {
            const saved = localStorage.getItem('codeflow_files');
            if (saved) {
                files = JSON.parse(saved);
                if (Object.keys(files).length === 0) files = { 'untitled.txt': '' };
                currentFile = Object.keys(files)[0];
            }
            renderFileList();
            loadCurrentFile();
        }

        function newFile() {
            let fileName = prompt('File name (with extension):', 'newfile.js');
            if (fileName && !files[fileName]) {
                files[fileName] = '';
                currentFile = fileName;
                saveFiles();
                loadCurrentFile();
                renderFileList();
                setStatus(`✨ Created ${fileName}`);
            } else if (fileName) alert('File exists!');
        }

        function deleteFile(fileName) {
            if (confirm(`Delete "${fileName}"?`)) {
                delete files[fileName];
                if (Object.keys(files).length === 0) files = { 'untitled.txt': '' };
                if (currentFile === fileName) currentFile = Object.keys(files)[0];
                saveFiles();
                renderFileList();
                loadCurrentFile();
                setStatus(`🗑️ Deleted ${fileName}`);
            }
        }

        function switchFile(fileName) {
            saveCurrentFile();
            currentFile = fileName;
            loadCurrentFile();
            renderFileList();
        }

        function clearEditor() {
            if (confirm('Clear all content?')) {
                editor.setValue('');
                saveCurrentFile();
                setStatus('🧹 Editor cleared');
            }
        }

        function downloadFile() {
            const blob = new Blob([editor.getValue()], { type: 'text/plain' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = currentFile;
            link.click();
            URL.revokeObjectURL(link.href);
            setStatus(`📥 Downloaded ${currentFile}`);
        }

        function setStatus(msg) {
            statusEl.textContent = msg;
            setTimeout(() => { if (statusEl.textContent === msg) statusEl.textContent = '🚀 Ready to code'; }, 2000);
        }

        function renderFileList() {
            fileListEl.innerHTML = '';
            for (const fileName in files) {
                const li = document.createElement('li');
                if (fileName === currentFile) li.classList.add('active');
                const nameSpan = document.createElement('span');
                nameSpan.className = 'file-name';
                const ext = fileName.split('.').pop().toLowerCase();
                const icons = { 'js': '🟨', 'html': '🌐', 'css': '🎨', 'py': '🐍', 'java': '☕', 'cpp': '⚙️', 'txt': '📄' };
                nameSpan.innerHTML = `${icons[ext] || '📄'} ${fileName}`;
                nameSpan.onclick = () => switchFile(fileName);
                const delBtn = document.createElement('button');
                delBtn.textContent = '×';
                delBtn.className = 'delete-file';
                delBtn.onclick = (e) => { e.stopPropagation(); deleteFile(fileName); };
                li.appendChild(nameSpan);
                li.appendChild(delBtn);
                fileListEl.appendChild(li);
            }
        }

        // Event Listeners
        document.getElementById('newFileBtn').addEventListener('click', newFile);
        document.getElementById('saveBtn').addEventListener('click', saveCurrentFile);
        document.getElementById('clearBtn').addEventListener('click', clearEditor);
        document.getElementById('downloadBtn').addEventListener('click', downloadFile);
        document.getElementById('formatBtn').addEventListener('click', formatCode);
        languageSelect.addEventListener('change', (e) => changeLanguageMode(e.target.value));

        initEditor();
        loadFiles();
        window.addEventListener('beforeunload', () => saveCurrentFile());
    </script>
</body>
</html>
