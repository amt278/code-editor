<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeFlow - Modern Online Text Editor</title>
    
    <!-- CodeMirror CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/theme/dracula.min.css">
    
    <!-- CodeMirror JS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/codemirror.min.js"></script>
    
    <!-- CodeMirror Modes -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/mode/javascript/javascript.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/mode/htmlmixed/htmlmixed.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/mode/css/css.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/mode/python/python.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/mode/java/java.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/mode/clike/clike.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/mode/php/php.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/mode/ruby/ruby.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/mode/go/go.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/mode/xml/xml.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/mode/markdown/markdown.min.js"></script>
    
    <!-- JS Beautifier -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/js-beautify/1.14.9/beautify.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/js-beautify/1.14.9/beautify-css.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/js-beautify/1.14.9/beautify-html.min.js"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Monaco', monospace;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            overflow: hidden;
        }
        .editor-container {
            height: 100vh;
            display: flex;
            flex-direction: column;
            background: rgba(30, 30, 40, 0.95);
            backdrop-filter: blur(20px);
            margin: 20px;
            border-radius: 30px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.1);
        }
        .toolbar {
            background: rgba(20,20,30,0.8);
            padding: 15px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            flex-wrap: wrap;
            gap: 15px;
        }
        .logo-area { display: flex; align-items: center; gap: 10px; }
        .logo { font-size: 1.8rem; animation: wave 2s ease-in-out infinite; }
        @keyframes wave { 0%,100% { transform: rotate(0deg); } 25% { transform: rotate(15deg); } 75% { transform: rotate(-15deg); } }
        .logo-text { font-size: 1.3rem; font-weight: bold; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .file-controls { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 8px 18px;
            border-radius: 50px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        button:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(102,126,234,0.4); }
        .btn-outline { background: transparent; border: 2px solid #667eea; color: #667eea; }
        .btn-outline:hover { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }
        
        /* Beautiful Font Size Controls */
        .font-controls {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(255, 255, 255, 0.05);
            padding: 4px 8px;
            border-radius: 60px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
        }
        .font-btn {
            width: 32px;
            height: 32px;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            background: rgba(102, 126, 234, 0.2);
            font-size: 18px;
            font-weight: bold;
            transition: all 0.3s ease;
        }
        .font-btn:hover {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            transform: scale(1.05);
        }
        .font-btn:active {
            transform: scale(0.95);
        }
        .font-size-display {
            min-width: 55px;
            text-align: center;
            font-size: 13px;
            font-weight: 600;
            color: white;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 4px 10px;
            border-radius: 30px;
            letter-spacing: 0.5px;
            box-shadow: 0 2px 8px rgba(102, 126, 234, 0.3);
        }
        .font-reset-btn {
            width: 28px;
            height: 28px;
            padding: 0;
            font-size: 14px;
            background: rgba(255, 255, 255, 0.1);
        }
        .font-reset-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: rotate(180deg);
        }
        .font-controls-divider {
            width: 1px;
            height: 25px;
            background: rgba(255, 255, 255, 0.1);
            margin: 0 4px;
        }
        
        .status-area { display: flex; gap: 15px; align-items: center; }
        .language-selector {
            background: rgba(255,255,255,0.1);
            color: white;
            border: 1px solid rgba(255,255,255,0.2);
            padding: 8px 15px;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .language-selector:hover {
            background: rgba(255,255,255,0.2);
        }
        .status { color: #4ec9b0; font-size: 12px; padding: 5px 12px; background: rgba(78,201,176,0.1); border-radius: 50px; }
        .main-content { display: flex; flex: 1; overflow: hidden; }
        .sidebar {
            width: 280px;
            background: rgba(20,20,30,0.6);
            border-right: 1px solid rgba(255,255,255,0.1);
            overflow-y: auto;
        }
        .sidebar-header { 
            padding: 20px; 
            color: #fff; 
            font-size: 12px; 
            text-transform: uppercase; 
            letter-spacing: 2px; 
            border-bottom: 1px solid rgba(255,255,255,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .file-list { list-style: none; padding: 10px; }
        .file-list li {
            padding: 12px 15px;
            margin-bottom: 5px;
            color: #ccc;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-radius: 12px;
            transition: all 0.3s;
            position: relative;
        }
        .file-list li:hover { background: rgba(102,126,234,0.1); transform: translateX(5px); }
        .file-list li.active { background: linear-gradient(135deg, #667eea20 0%, #764ba220 100%); color: white; transform: translateX(5px); }
        .file-name { flex: 1; display: flex; align-items: center; gap: 10px; }
        .file-actions {
            display: flex;
            gap: 5px;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .file-list li:hover .file-actions {
            opacity: 1;
        }
        .rename-file, .delete-file {
            background: rgba(255,255,255,0.1);
            color: #ccc;
            padding: 4px 8px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.3s;
            border: none;
        }
        .rename-file:hover { background: #4ec9b0; color: white; transform: scale(1.05); }
        .delete-file:hover { background: #ff4444; color: white; transform: scale(1.05); }
        .editor-area { flex: 1; display: flex; flex-direction: column; }
        .editor-header {
            padding: 15px 25px;
            background: rgba(20,20,30,0.4);
            border-bottom: 1px solid rgba(255,255,255,0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }
        .current-file-badge { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); padding: 4px 12px; border-radius: 50px; font-size: 11px; }
        .editor-stats { display: flex; gap: 20px; color: #858585; font-size: 12px; }
        .CodeMirror { flex: 1; height: auto !important; background: rgba(20,20,30,0.4) !important; font-size: 15px; line-height: 1.6; transition: font-size 0.2s ease; }
        .CodeMirror-gutters { background: rgba(20,20,30,0.6) !important; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: rgba(255,255,255,0.05); border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border-radius: 10px; }
        
        /* Beautiful Font Size Indicator */
        .font-size-indicator {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            backdrop-filter: blur(20px);
            color: white;
            padding: 10px 24px;
            border-radius: 60px;
            font-size: 14px;
            font-weight: 600;
            z-index: 1000;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s, transform 0.2s;
            font-family: monospace;
            letter-spacing: 0.5px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.2);
            white-space: nowrap;
        }
        .font-size-indicator.show {
            opacity: 1;
            transform: translateX(-50%) translateY(-10px);
        }
        
        /* Rename Dialog */
        .rename-dialog-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s;
        }
        .rename-dialog-overlay.active {
            opacity: 1;
            visibility: visible;
        }
        .rename-dialog {
            background: rgba(30,30,40,0.98);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 30px;
            min-width: 400px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.1);
            transform: scale(0.9);
            transition: transform 0.3s;
        }
        .rename-dialog-overlay.active .rename-dialog {
            transform: scale(1);
        }
        .rename-dialog h3 {
            color: white;
            margin-bottom: 20px;
            font-size: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .rename-dialog input {
            width: 100%;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            padding: 12px 16px;
            border-radius: 12px;
            color: white;
            font-size: 14px;
            margin-bottom: 20px;
        }
        .rename-dialog input:focus {
            outline: none;
            border-color: #667eea;
        }
        .rename-dialog-actions {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
        }
        .rename-dialog-actions button {
            padding: 8px 20px;
        }
        .cancel-btn {
            background: rgba(255,255,255,0.1);
        }
        .cancel-btn:hover {
            background: rgba(255,255,255,0.2);
        }
        
        @media (max-width: 768px) { 
            .sidebar { width: 200px; } 
            .toolbar { flex-direction: column; }
            .font-controls { order: 1; }
            .font-size-indicator { font-size: 12px; padding: 8px 18px; white-space: nowrap; }
            .rename-dialog { min-width: 300px; margin: 20px; }
        }
    </style>
</head>
<body>
    <div class="editor-container">
        <div class="toolbar">
            <div class="logo-area">
                <span class="logo">✏️</span>
                <span class="logo-text">CodeFlow Studio</span>
            </div>
            <div class="file-controls">
                <button id="newFileBtn">✨ New File</button>
                <button id="saveBtn" class="btn-outline">💾 Save</button>
                <button id="formatBtn">🎨 Format Code</button>
                
                <!-- Beautiful Font Size Controls -->
                <div class="font-controls">
                    <button id="fontDecreaseBtn" class="font-btn" title="Decrease Font Size (Ctrl+-)">−</button>
                    <div class="font-size-display" id="fontSizeValue">15px</div>
                    <button id="fontIncreaseBtn" class="font-btn" title="Increase Font Size (Ctrl++)">+</button>
                    <div class="font-controls-divider"></div>
                    <button id="fontResetBtn" class="font-btn font-reset-btn" title="Reset Font Size (Ctrl+0)">↺</button>
                </div>
                
                <button id="downloadBtn">📥 Download</button>
                <button id="clearBtn">🗑️ Clear</button>
            </div>
            <div class="status-area">
                <select id="languageSelect" class="language-selector">
                    <option value="javascript">🟨 JavaScript</option>
                    <option value="html">🌐 HTML</option>
                    <option value="css">🎨 CSS</option>
                    <option value="python">🐍 Python</option>
                    <option value="java">☕ Java</option>
                    <option value="cpp">⚙️ C++</option>
                    <option value="plaintext">📝 Plain Text</option>
                </select>
                <div class="status" id="status">🚀 Ready to code</div>
            </div>
        </div>

        <div class="main-content">
            <div class="sidebar">
                <div class="sidebar-header">
                    <span>📁 YOUR FILES</span>
                </div>
                <ul class="file-list" id="fileList"></ul>
            </div>
            <div class="editor-area">
                <div class="editor-header">
                    <div class="current-file">
                        <span>📝 Currently editing</span>
                        <span class="current-file-badge" id="currentFile">untitled.txt</span>
                    </div>
                    <div class="editor-stats">
                        <div class="stat">📊 Lines: <strong id="lineCount">1</strong></div>
                        <div class="stat">📏 Characters: <strong id="charCount">0</strong></div>
                        <div class="stat">💬 Words: <strong id="wordCount">0</strong></div>
                    </div>
                </div>
                <textarea id="editor"></textarea>
            </div>
        </div>
    </div>
    
    <!-- Beautiful Font Size Indicator -->
    <div id="fontSizeIndicator" class="font-size-indicator">🔤 Font Size: 15px</div>
    
    <!-- Rename Dialog -->
    <div id="renameDialog" class="rename-dialog-overlay">
        <div class="rename-dialog">
            <h3>✏️ Rename File</h3>
            <input type="text" id="renameInput" placeholder="Enter new filename (with extension)" autocomplete="off">
            <div class="rename-dialog-actions">
                <button id="cancelRenameBtn" class="cancel-btn">Cancel</button>
                <button id="confirmRenameBtn">Rename</button>
            </div>
        </div>
    </div>

    <script>
        let files = { 'untitled.txt': '// Welcome to CodeFlow Studio!\n// Click "Format Code" to beautify your code!\n// Use the A+ / A- buttons to change font size\n// Or use keyboard shortcuts: Ctrl++ / Ctrl+-\n// Hover over files to see Rename option!\n\nfunction hello(){console.log("Hello World");const x=10;if(x>5){return true;}else{return false;}}' };
        let currentFile = 'untitled.txt';
        let editor = null;
        let currentFontSize = 15;
        const MIN_FONT_SIZE = 10;
        const MAX_FONT_SIZE = 32;
        let fileToRename = null;

        const fileListEl = document.getElementById('fileList');
        const currentFileEl = document.getElementById('currentFile');
        const statusEl = document.getElementById('status');
        const lineCountEl = document.getElementById('lineCount');
        const charCountEl = document.getElementById('charCount');
        const wordCountEl = document.getElementById('wordCount');
        const languageSelect = document.getElementById('languageSelect');
        const textarea = document.getElementById('editor');
        const fontSizeValueEl = document.getElementById('fontSizeValue');
        const fontSizeIndicator = document.getElementById('fontSizeIndicator');
        const renameDialog = document.getElementById('renameDialog');
        const renameInput = document.getElementById('renameInput');

        function initEditor() {
            editor = CodeMirror.fromTextArea(textarea, {
                lineNumbers: true,
                theme: 'dracula',
                mode: 'javascript',
                autoCloseTags: true,
                autoCloseBrackets: true,
                matchBrackets: true,
                indentUnit: 4,
                tabSize: 4,
                lineWrapping: true
            });
            editor.on('change', () => {
                updateStats();
                saveCurrentFile();
            });
            updateStats();
            
            const savedFontSize = localStorage.getItem('codeflow_fontSize');
            if (savedFontSize) {
                currentFontSize = parseInt(savedFontSize);
                applyFontSize();
            }
        }

        // Font Size Functions
        function applyFontSize() {
            const editorElement = document.querySelector('.CodeMirror');
            if (editorElement) {
                editorElement.style.fontSize = currentFontSize + 'px';
                fontSizeValueEl.textContent = currentFontSize + 'px';
                
                fontSizeIndicator.textContent = `🔤 Font Size: ${currentFontSize}px`;
                fontSizeIndicator.classList.add('show');
                setTimeout(() => {
                    fontSizeIndicator.classList.remove('show');
                }, 1500);
                
                localStorage.setItem('codeflow_fontSize', currentFontSize);
                editorElement.style.lineHeight = (currentFontSize * 1.2) + 'px';
            }
        }
        
        function increaseFontSize() {
            if (currentFontSize < MAX_FONT_SIZE) {
                currentFontSize++;
                applyFontSize();
                setStatus(`🔤 Font size increased to ${currentFontSize}px`);
            } else {
                setStatus(`⚠️ Maximum font size (${MAX_FONT_SIZE}px) reached`);
                fontSizeValueEl.style.transform = 'scale(1.1)';
                setTimeout(() => fontSizeValueEl.style.transform = '', 200);
            }
        }
        
        function decreaseFontSize() {
            if (currentFontSize > MIN_FONT_SIZE) {
                currentFontSize--;
                applyFontSize();
                setStatus(`🔤 Font size decreased to ${currentFontSize}px`);
            } else {
                setStatus(`⚠️ Minimum font size (${MIN_FONT_SIZE}px) reached`);
                fontSizeValueEl.style.transform = 'scale(1.1)';
                setTimeout(() => fontSizeValueEl.style.transform = '', 200);
            }
        }
        
        function resetFontSize() {
            currentFontSize = 15;
            applyFontSize();
            setStatus(`🔤 Font size reset to ${currentFontSize}px`);
            fontSizeValueEl.style.transform = 'scale(1.2)';
            setTimeout(() => fontSizeValueEl.style.transform = '', 300);
        }

        // File Rename Functions
        function openRenameDialog(fileName) {
            fileToRename = fileName;
            renameInput.value = fileName;
            renameDialog.classList.add('active');
            setTimeout(() => renameInput.focus(), 100);
            renameInput.select();
        }
        
        function closeRenameDialog() {
            renameDialog.classList.remove('active');
            fileToRename = null;
        }
        
        function confirmRename() {
            const newFileName = renameInput.value.trim();
            if (!newFileName) {
                setStatus('❌ Filename cannot be empty');
                return;
            }
            
            if (newFileName === fileToRename) {
                closeRenameDialog();
                return;
            }
            
            if (files[newFileName]) {
                setStatus('❌ A file with this name already exists');
                renameInput.style.borderColor = '#ff4444';
                setTimeout(() => renameInput.style.borderColor = '', 1000);
                return;
            }
            
            // Perform rename
            const content = files[fileToRename];
            delete files[fileToRename];
            files[newFileName] = content;
            
            // Update current file if needed
            if (currentFile === fileToRename) {
                currentFile = newFileName;
            }
            
            saveFiles();
            renderFileList();
            loadCurrentFile();
            setStatus(`✏️ Renamed "${fileToRename}" → "${newFileName}"`);
            closeRenameDialog();
        }

        // Format Code Function
        function formatCode() {
            const content = editor.getValue();
            const extension = currentFile.split('.').pop().toLowerCase();
            let formatted = content;
            
            try {
                if (extension === 'js' || extension === 'javascript') {
                    formatted = js_beautify(content, { indent_size: 4, indent_char: ' ' });
                    setStatus('✅ JavaScript code formatted!');
                } 
                else if (extension === 'html' || extension === 'htm') {
                    formatted = html_beautify(content, { indent_size: 4, indent_char: ' ' });
                    setStatus('✅ HTML code formatted!');
                }
                else if (extension === 'css') {
                    formatted = css_beautify(content, { indent_size: 4, indent_char: ' ' });
                    setStatus('✅ CSS code formatted!');
                }
                else if (extension === 'json') {
                    formatted = js_beautify(content, { indent_size: 4 });
                    setStatus('✅ JSON formatted!');
                }
                else {
                    formatted = js_beautify(content, { indent_size: 4 });
                    setStatus('✅ Code formatted!');
                }
                
                if (formatted !== content) {
                    editor.setValue(formatted);
                } else {
                    setStatus('✨ Code is already well formatted!');
                }
            } catch (error) {
                setStatus('❌ Could not format code. Check syntax!');
            }
        }

        function updateStats() {
            if (editor) {
                const content = editor.getValue();
                const lines = content.split('\n').length;
                const chars = content.length;
                const words = content.trim() ? content.trim().split(/\s+/).length : 0;
                lineCountEl.textContent = lines;
                charCountEl.textContent = chars;
                wordCountEl.textContent = words;
            }
        }

        function changeLanguageMode(language) {
            let mode = 'text/plain';
            if (language === 'javascript') mode = 'javascript';
            else if (language === 'html') mode = 'htmlmixed';
            else if (language === 'css') mode = 'css';
            else if (language === 'python') mode = 'python';
            else if (language === 'java') mode = 'text/x-java';
            else if (language === 'cpp') mode = 'text/x-c++src';
            else mode = 'text/plain';
            editor.setOption('mode', mode);
        }

        function updateLanguageFromExtension() {
            const ext = currentFile.split('.').pop().toLowerCase();
            const map = { 'js': 'javascript', 'html': 'html', 'css': 'css', 'py': 'python', 'java': 'java', 'cpp': 'cpp' };
            const lang = map[ext] || 'plaintext';
            languageSelect.value = lang;
            changeLanguageMode(lang);
        }

        function saveFiles() { localStorage.setItem('codeflow_files', JSON.stringify(files)); }
        function saveCurrentFile() { files[currentFile] = editor.getValue(); saveFiles(); renderFileList(); }
        
        function loadCurrentFile() {
            editor.setValue(files[currentFile] || '');
            currentFileEl.textContent = currentFile;
            updateStats();
            updateLanguageFromExtension();
            setStatus(`✨ Loaded ${currentFile}`);
        }

        function loadFiles() {
            const saved = localStorage.getItem('codeflow_files');
            if (saved) {
                files = JSON.parse(saved);
                if (Object.keys(files).length === 0) files = { 'untitled.txt': '' };
                currentFile = Object.keys(files)[0];
            }
            renderFileList();
            loadCurrentFile();
        }

        function newFile() {
            let fileName = prompt('File name (with extension):', 'newfile.js');
            if (fileName && !files[fileName]) {
                files[fileName] = '';
                currentFile = fileName;
                saveFiles();
                loadCurrentFile();
                renderFileList();
                setStatus(`✨ Created ${fileName}`);
            } else if (fileName) alert('File exists!');
        }

        function deleteFile(fileName) {
            if (confirm(`Delete "${fileName}"?`)) {
                delete files[fileName];
                if (Object.keys(files).length === 0) files = { 'untitled.txt': '' };
                if (currentFile === fileName) currentFile = Object.keys(files)[0];
                saveFiles();
                renderFileList();
                loadCurrentFile();
                setStatus(`🗑️ Deleted ${fileName}`);
            }
        }

        function switchFile(fileName) {
            saveCurrentFile();
            currentFile = fileName;
            loadCurrentFile();
            renderFileList();
        }

        function clearEditor() {
            if (confirm('Clear all content?')) {
                editor.setValue('');
                saveCurrentFile();
                setStatus('🧹 Editor cleared');
            }
        }

        function downloadFile() {
            const blob = new Blob([editor.getValue()], { type: 'text/plain' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = currentFile;
            link.click();
            URL.revokeObjectURL(link.href);
            setStatus(`📥 Downloaded ${currentFile}`);
        }

        function setStatus(msg) {
            statusEl.textContent = msg;
            setTimeout(() => { if (statusEl.textContent === msg) statusEl.textContent = '🚀 Ready to code'; }, 2000);
        }

        function renderFileList() {
            fileListEl.innerHTML = '';
            for (const fileName in files) {
                const li = document.createElement('li');
                if (fileName === currentFile) li.classList.add('active');
                
                const nameSpan = document.createElement('span');
                nameSpan.className = 'file-name';
                const ext = fileName.split('.').pop().toLowerCase();
                const icons = { 'js': '🟨', 'html': '🌐', 'css': '🎨', 'py': '🐍', 'java': '☕', 'cpp': '⚙️', 'txt': '📄' };
                nameSpan.innerHTML = `${icons[ext] || '📄'} ${fileName}`;
                nameSpan.onclick = () => switchFile(fileName);
                
                const actionsDiv = document.createElement('div');
                actionsDiv.className = 'file-actions';
                
                const renameBtn = document.createElement('button');
                renameBtn.textContent = '✏️';
                renameBtn.className = 'rename-file';
                renameBtn.title = 'Rename';
                renameBtn.onclick = (e) => {
                    e.stopPropagation();
                    openRenameDialog(fileName);
                };
                
                const delBtn = document.createElement('button');
                delBtn.textContent = '×';
                delBtn.className = 'delete-file';
                delBtn.title = 'Delete';
                delBtn.onclick = (e) => {
                    e.stopPropagation();
                    deleteFile(fileName);
                };
                
                actionsDiv.appendChild(renameBtn);
                actionsDiv.appendChild(delBtn);
                
                li.appendChild(nameSpan);
                li.appendChild(actionsDiv);
                fileListEl.appendChild(li);
            }
        }

        // Keyboard shortcuts
        function setupKeyboardShortcuts() {
            document.addEventListener('keydown', (e) => {
                if ((e.ctrlKey || e.metaKey) && (e.key === '+' || e.key === '=')) {
                    e.preventDefault();
                    increaseFontSize();
                }
                else if ((e.ctrlKey || e.metaKey) && e.key === '-') {
                    e.preventDefault();
                    decreaseFontSize();
                }
                else if ((e.ctrlKey || e.metaKey) && e.key === '0') {
                    e.preventDefault();
                    resetFontSize();
                }
                else if (e.key === 'Escape' && renameDialog.classList.contains('active')) {
                    closeRenameDialog();
                }
            });
            
            renameInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    confirmRename();
                }
            });
        }

        // Event Listeners
        document.getElementById('newFileBtn').addEventListener('click', newFile);
        document.getElementById('saveBtn').addEventListener('click', saveCurrentFile);
        document.getElementById('clearBtn').addEventListener('click', clearEditor);
        document.getElementById('downloadBtn').addEventListener('click', downloadFile);
        document.getElementById('formatBtn').addEventListener('click', formatCode);
        document.getElementById('cancelRenameBtn').addEventListener('click', closeRenameDialog);
        document.getElementById('confirmRenameBtn').addEventListener('click', confirmRename);
        
        document.getElementById('fontIncreaseBtn').addEventListener('click', increaseFontSize);
        document.getElementById('fontDecreaseBtn').addEventListener('click', decreaseFontSize);
        document.getElementById('fontResetBtn').addEventListener('click', resetFontSize);
        
        languageSelect.addEventListener('change', (e) => changeLanguageMode(e.target.value));

        initEditor();
        loadFiles();
        setupKeyboardShortcuts();
        window.addEventListener('beforeunload', () => saveCurrentFile());
    </script>
</body>
</html>
